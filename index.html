<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catclass Web Tools Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #00ff66;
            --text-color: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .page-hero {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-hero h1 {
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
        }

        .page-hero p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .tool-card {
            background-color: var(--card-bg);
            border: 1px solid #2e2e2e;
            border-radius: 8px;
            padding: 1.5rem;
            text-decoration: none;
            color: var(--text-color);
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .tool-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-color);
            box-shadow: 0 4px 20px rgba(0, 255, 102, 0.15);
        }

        .tool-title {
            font-size: 1.3rem;
            color: var(--accent-color);
            margin-bottom: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .tool-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            flex-grow: 1;
        }

        .tool-action {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--text-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .tool-action::after {
            content: "→";
            transition: transform 0.2s ease;
        }

        .tool-card:hover .tool-action::after {
            transform: translateX(4px);
        }

        .loading {
            text-align: center;
            color: var(--text-muted);
            grid-column: 1 / -1;
            font-size: 1.2rem;
            padding: 2rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="page-hero">
            <h1>🛠️ Web Tools Dashboard</h1>
            <p>A collection of helpful utilities and generators.</p>
        </header>

        <main class="tools-grid" id="tools-container">
            <div class="loading">Scanning repository for tools...</div>
        </main>
    </div>

    <script>
        const GITHUB_USERNAME = 'task4z'; 
        const REPO_NAME = 'tools';

        async function fetchTools() {
            const container = document.getElementById('tools-container');
            
            try {
                const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents`);
                if (!response.ok) throw new Error('Failed to fetch repository files.');
                
                const items = await response.json();
                
                container.innerHTML = '';

                const folders = items.filter(item => item.type === 'dir' && !item.name.startsWith('.') && !item.name.includes('assets'));

                if (folders.length === 0) {
                    container.innerHTML = '<div class="loading">No tool folders found.</div>';
                    return;
                }

                folders.forEach(folder => {
                    const cleanTitle = folder.name.replace(/_/g, ' ').replace(/-/g, ' ');
                    
                    const card = document.createElement('a');
                    card.href = `./${folder.name}/index.html`;
                    card.className = 'tool-card';
                    
                    card.innerHTML = `
                        <div>
                            <div class="tool-title">${cleanTitle}</div>
                            <p class="tool-desc">Open the web utility located in the /${folder.name} directory.</p>
                        </div>
                        <div class="tool-action">Launch Tool</div>
                    `;
                    
                    container.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="loading" style="color: #ff4444;">Error loading tools. Make sure your repository is public!</div>`;
            }
        }

        fetchTools();
    </script>
    <script src="header.js"></script>
</body>
</html>
