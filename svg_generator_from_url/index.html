<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Web Viewport Generator</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #00ff66;
            --accent-hover: #00cc52;
            --text-color: #ffffff;
            --text-muted: #a0a0a0;
            --border-color: #2e2e2e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        h2 {
            color: var(--accent-color);
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="url"] {
            flex: 1;
            background-color: #151515;
            color: #e0e0e0;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            font-size: 16px;
            font-family: 'Fira Code', Consolas, Monaco, monospace;
            transition: border-color 0.2s ease;
        }

        input[type="url"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s ease;
        }

        .btn-generate { 
            background-color: var(--accent-color); 
            color: #121212; 
        }
        
        .btn-generate:hover { 
            background-color: var(--accent-hover); 
        }

        .btn-download { 
            background-color: #333333; 
            color: #ffffff; 
        }
        
        .btn-download:hover { 
            background-color: #444444; 
        }
        
        .preview-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media (min-width: 768px) {
            .preview-container { grid-template-columns: 1fr 1fr; }
        }
        
        .box {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 15px;
            background: #151515;
        }

        .box h3 { 
            margin-top: 0; 
            margin-bottom: 10px; 
            font-size: 1.1rem;
            color: var(--text-muted);
        }
        
        iframe {
            width: 100%;
            height: 400px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: #fff;
        }
        
        textarea {
            width: 100%;
            height: 400px;
            font-family: 'Fira Code', Consolas, Monaco, monospace;
            font-size: 0.85rem;
            padding: 12px;
            box-sizing: border-box;
            background-color: #0d0d0d;
            color: #e0e0e0;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        
        .actions {
            margin-top: 12px;
            display: flex;
            justify-content: flex-end;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>SVG Web Viewport Generator</h2>
    <p class="subtitle">Enter a URL below to preview the live site embed and generate an SVG wrapped with your custom structure.</p>
    
    <div class="input-group">
        <input type="url" id="urlInput" value="https://catclass.net/" placeholder="https://example.com" required>
        <button class="btn-generate" onclick="updateGenerator()">Generate & Preview</button>
    </div>

    <div class="preview-container">
        <div class="box">
            <h3>1. Live Website Preview</h3>
            <iframe id="livePreview" src="https://catclass.net/"></iframe>
        </div>

        <div class="box">
            <h3>2. Generated SVG Raw Code</h3>
            <textarea id="svgOutput" readonly></textarea>
            <div class="actions">
                <button class="btn-download" id="downloadBtn" onclick="downloadSVG()">Download .svg File</button>
            </div>
        </div>
    </div>
</div>

<script>
    function generateSVGCode(url) {
        return `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;">

  <foreignObject x="0" y="0" width="100%" height="100%">
    <xhtml:div xmlns:xhtml="http://www.w3.org/1999/xhtml" style="width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;">
      <xhtml:iframe 
        src="${url}" 
        style="width: 100%; height: 100%; border: none; background: white;"
      />
    </xhtml:div>
  </foreignObject>

  <text class="watermark-text" x="50%" y="25" text-anchor="middle" style="font-family: sans-serif; font-size: 16px; fill: #333;">
    via <a href="https://catclass.net" target="_blank">catclass.net</a>
  </text>
</svg>`;
    }

    function updateGenerator() {
        let url = document.getElementById('urlInput').value.trim();
        
        if (url && !/^https?:\/\//i.test(url)) {
            url = 'https://' + url;
            document.getElementById('urlInput').value = url;
        }

        if(!url) return;

        document.getElementById('livePreview').src = url;

        const generatedSvg = generateSVGCode(url);
        document.getElementById('svgOutput').value = generatedSvg;
    }

    function downloadSVG() {
        const svgContent = document.getElementById('svgOutput').value;
        if(!svgContent) return alert('Please generate an SVG first!');

        const blob = new Blob([svgContent], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        
        const downloadLink = document.createElement('a');
        downloadLink.href = url;
        downloadLink.download = 'web-viewport.svg';
        
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
        URL.revokeObjectURL(url);
    }

    window.onload = updateGenerator;
</script>

    <script src="../header.js" data-base="../"></script>
</body>
</html>
